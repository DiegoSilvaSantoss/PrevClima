<!DOCTYPE html>
<html lang="pt-bt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/css/styles.css">
  <link rel="icon" type="image/x-icon" href="./src/img/global-warming.png">
  <title>Prev Clima</title>
</head>

<body>
  
  <h1 class="title-temp">Previsão do Tempo</h1>
  
  <div class="card-temp">
    
    <div class="box-input">
      <input class="campo-city" id="campo" type="text" required>
      <label for="campo" class="label-city">Digite sua cidade</label>
      <label class="campo-vazio"></label>
      <label class="clear-campo">X</label>
      <button class="btn-voz"><video src="./src/video/record.mp4" muted autoplay loop></video></button>
      <button class="btn-busca"><img src="./src/img/search.png" alt="imagem lupa pesquisa"></button>
      <ul class="sugestao" id="sugestoes"></ul>
    </div>
    
    <div class="dados-temp"></div>
    <div class="dados-prev"></div>
    <div class="erro-msg"></div>
    <div class="ok-cidade"></div>
    <div class="teste"></div>
    
  </div>
  
  <img class="img-fundo" src="./src/img/fundo.png" alt="imagem de fundo">
  <audio class="som-ok" src="./src/audio/linkedin_notification.mp3"></audio>
  <audio class="som-erro" src="./src/audio/lesiakower-error-mistake-sound-effect-incorrect-answer-437420.mp3"></audio>
  
  <span class="ass">© 2026 DiegoDev — Criador do site PrevTemp</span>
  
</body>
<script type="module" src="./app.js"></script>

</html>
